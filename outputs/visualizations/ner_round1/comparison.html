<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>NER Round 1: Gold vs Predictions</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 24px;
        background: #fafbfc;
        color: #24292e;
      }
      header {
        margin-bottom: 24px;
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 28px;
        font-weight: 600;
      }
      .subtitle {
        font-size: 14px;
        color: #586069;
        margin: 0 0 16px 0;
      }
      .legend {
        display: flex;
        gap: 20px;
        margin-top: 12px;
        font-size: 13px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .legend-box {
        width: 20px;
        height: 20px;
        border-radius: 3px;
      }
      .gold { background: #ffd700; }
      .pred { background: #7fdbff; }
      .both { background: linear-gradient(135deg, #ffd700 0%, #ffd700 50%, #7fdbff 50%, #7fdbff 100%); }

      .error {
        background: #ffeaea;
        border: 1px solid #d73a49;
        border-radius: 6px;
        padding: 16px;
        color: #d73a49;
      }
      .error strong { font-weight: 600; }

      .abstract-list {
        display: flex;
        gap: 8px;
        margin: 20px 0;
        flex-wrap: wrap;
      }
      .abstract-btn {
        padding: 8px 12px;
        border: 1px solid #e1e4e8;
        background: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
      }
      .abstract-btn:hover {
        border-color: #0366d6;
        color: #0366d6;
      }
      .abstract-btn.active {
        background: #0366d6;
        color: white;
        border-color: #0366d6;
      }

      .abstract-viewer {
        background: white;
        border: 1px solid #e1e4e8;
        border-radius: 6px;
        padding: 24px;
      }
      .abstract-id {
        font-size: 13px;
        color: #586069;
        margin-bottom: 16px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .abstract-text {
        line-height: 2;
        font-size: 15px;
        margin-bottom: 32px;
        padding: 20px;
        background: #f6f8fa;
        border-radius: 4px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .entity-span {
        padding: 2px 4px;
        border-radius: 3px;
        cursor: help;
        font-weight: 500;
        box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1);
      }

      .entity-span.gold-only {
        background: #ffd700;
      }

      .entity-span.pred-only {
        background: #7fdbff;
      }

      .entity-span.both {
        background: linear-gradient(135deg, #ffd700 0%, #ffd700 50%, #7fdbff 50%, #7fdbff 100%);
      }

      .entity-tooltip {
        position: absolute;
        background: #24292e;
        color: white;
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 12px;
        z-index: 1000;
        pointer-events: none;
        max-width: 250px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }

      .entity-comparison {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid #e1e4e8;
      }

      .entity-col h3 {
        margin: 0 0 12px 0;
        font-size: 13px;
        font-weight: 600;
        padding-bottom: 8px;
        border-bottom: 2px solid #e1e4e8;
      }

      .entity-col.gold h3 { border-bottom-color: #ffd700; }
      .entity-col.pred h3 { border-bottom-color: #7fdbff; }

      .entity-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .entity-item {
        padding: 8px 12px;
        margin-bottom: 6px;
        border-radius: 4px;
        font-size: 13px;
        border-left: 3px solid #e1e4e8;
      }

      .entity-item.matched {
        background: #f0f8ff;
        border-left-color: #28a745;
      }

      .entity-item.unmatched {
        background: #fff3cd;
        border-left-color: #ffc107;
      }

      .entity-form {
        font-weight: 600;
        color: #24292e;
      }

      .entity-field {
        font-size: 11px;
        color: #586069;
        margin-top: 2px;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>NER Round 1: Gold vs Predictions</h1>
      <p class="subtitle">Highlighted entities directly in abstract text</p>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-box gold"></div>
          <span>Gold Standard Only</span>
        </div>
        <div class="legend-item">
          <div class="legend-box pred"></div>
          <span>Predictions Only</span>
        </div>
        <div class="legend-item">
          <div class="legend-box both"></div>
          <span>Gold + Predictions (Matched)</span>
        </div>
      </div>
    </header>

    <div id="abstract-list" class="abstract-list"></div>
    <div class="abstract-viewer" id="abstract-viewer">
      <div class="loading">Loading data...</div>
    </div>

    <script>
      let goldData = null;
      let predData = null;
      let abstracts = [];

      // Fetch both files
      Promise.all([
        fetch('../../../data/processed/evaluation/ner_round1/entities_gold_with_mentions.json').then(r => r.json()),
        fetch('../../../data/processed/evaluation/ner_round1/entities_pretrainedmodel_with_mentions.json').then(r => r.json())
      ])
        .then(([gold, pred]) => {
          goldData = gold;
          predData = pred;

          // Build abstract list from both sources
          const abstractIds = new Set();
          (gold.abstracts || []).forEach(a => abstractIds.add(a.abstract.abstract_id));
          (pred.abstracts || []).forEach(a => abstractIds.add(a.abstract.abstract_id));

          abstracts = Array.from(abstractIds).sort();
          renderAbstractList();
          if (abstracts.length > 0) {
            selectAbstract(abstracts[0]);
          }
        })
        .catch(err => {
          document.getElementById('abstract-viewer').innerHTML = `
            <div class="error">
              <strong>Error loading files:</strong> ${err.message}
              <p style="margin-top: 8px; font-size: 12px;">
                Make sure you ran: <code>python -m src.pipeline.ner_evaluation --mode round1</code>
              </p>
            </div>
          `;
        });

      function renderAbstractList() {
        const container = document.getElementById('abstract-list');
        container.innerHTML = abstracts.map(id => `
          <button class="abstract-btn" onclick="selectAbstract('${id}')">
            ${id}
          </button>
        `).join('');
      }

      function selectAbstract(abstractId) {
        // Update active button
        document.querySelectorAll('.abstract-btn').forEach(btn => {
          btn.classList.toggle('active', btn.textContent.trim() === abstractId);
        });

        // Find entries in both files
        const goldEntry = (goldData.abstracts || []).find(a => a.abstract.abstract_id === abstractId);
        const predEntry = (predData.abstracts || []).find(a => a.abstract.abstract_id === abstractId);

        if (!goldEntry && !predEntry) return;

        const abstractText = goldEntry ? goldEntry.abstract.text : predEntry.abstract.text;
        const goldEntities = goldEntry ? goldEntry.entities : [];
        const predEntities = predEntry ? predEntry.entities : [];

        // Build highlighted text
        const highlightedText = buildHighlightedText(abstractText, goldEntities, predEntities);

        // Group by field for side-by-side comparison
        const goldByField = groupBy(goldEntities, e => e.field);
        const predByField = groupBy(predEntities, e => e.field);
        const allFields = Array.from(new Set([...Object.keys(goldByField), ...Object.keys(predByField)])).sort();

        // Build matched set
        const matchedSet = new Set();
        goldEntities.forEach(ge => {
          predEntities.forEach(pe => {
            if (ge.field === pe.field && ge.entity_form === pe.entity_form) {
              matchedSet.add(`${ge.field}|${ge.entity_form}`);
            }
          });
        });

        let html = `<div class="abstract-id">${escapeHtml(abstractId)}</div>`;
        html += `<div class="abstract-text">${highlightedText}</div>`;

        // Entity comparison section
        html += '<div class="entity-comparison">';
        html += `<div class="entity-col gold"><h3>Gold (${goldEntities.length})</h3><ul class="entity-list">`;

        const goldHtml = goldEntities.map(e => {
          const key = `${e.field}|${e.entity_form}`;
          const isMatched = matchedSet.has(key);
          return `
            <li class="entity-item ${isMatched ? 'matched' : 'unmatched'}">
              <div class="entity-form">${escapeHtml(e.entity_form)}</div>
              <div class="entity-field">${escapeHtml(e.field)}</div>
            </li>
          `;
        }).join('');
        html += goldHtml || '<li style="color: #999; padding: 8px;">None</li>';

        html += '</ul></div>';
        html += `<div class="entity-col pred"><h3>Predictions (${predEntities.length})</h3><ul class="entity-list">`;

        const predHtml = predEntities.map(e => {
          const key = `${e.field}|${e.entity_form}`;
          const isMatched = matchedSet.has(key);
          return `
            <li class="entity-item ${isMatched ? 'matched' : 'unmatched'}">
              <div class="entity-form">${escapeHtml(e.entity_form)}</div>
              <div class="entity-field">${escapeHtml(e.field)}</div>
            </li>
          `;
        }).join('');
        html += predHtml || '<li style="color: #999; padding: 8px;">None</li>';

        html += '</ul></div></div>';

        document.getElementById('abstract-viewer').innerHTML = html;
      }

      function buildHighlightedText(text, goldEntities, predEntities) {
        // Create ranges with source info
        const ranges = [];

        goldEntities.forEach(e => {
          if (e.char_start !== undefined && e.char_end !== undefined) {
            ranges.push({
              start: e.char_start,
              end: e.char_end,
              source: 'gold',
              entity: e.entity_form,
              field: e.field
            });
          }
        });

        predEntities.forEach(e => {
          if (e.char_start !== undefined && e.char_end !== undefined) {
            ranges.push({
              start: e.char_start,
              end: e.char_end,
              source: 'pred',
              entity: e.entity_form,
              field: e.field
            });
          }
        });

        // Sort ranges by start position
        ranges.sort((a, b) => a.start - b.start);

        // Merge overlapping ranges
        const merged = [];
        for (const range of ranges) {
          const last = merged[merged.length - 1];
          if (last && last.end > range.start) {
            // Overlapping
            if (last.end < range.end) {
              last.end = range.end;
            }
            if (last.sourceSet.has(range.source)) {
              last.sourceSet.add(range.source);
            } else {
              last.sourceSet.add(range.source);
            }
            last.entities.push(range.entity);
            last.fields.push(range.field);
          } else {
            // New range
            merged.push({
              start: range.start,
              end: range.end,
              sourceSet: new Set([range.source]),
              entities: [range.entity],
              fields: [range.field]
            });
          }
        }

        // Build HTML
        let html = '';
        let lastEnd = 0;

        for (const range of merged) {
          // Add text before this range
          if (lastEnd < range.start) {
            html += escapeHtml(text.substring(lastEnd, range.start));
          }

          // Determine CSS class
          const sources = Array.from(range.sourceSet);
          let cssClass = '';
          if (sources.length === 2) {
            cssClass = 'both';
          } else if (sources.includes('gold')) {
            cssClass = 'gold-only';
          } else {
            cssClass = 'pred-only';
          }

          const entityText = text.substring(range.start, range.end);
          const tooltip = `${range.entities.join(', ')} [${range.fields.join(', ')}]`;

          html += `<span class="entity-span ${cssClass}" title="${escapeHtml(tooltip)}">${escapeHtml(entityText)}</span>`;

          lastEnd = range.end;
        }

        // Add remaining text
        if (lastEnd < text.length) {
          html += escapeHtml(text.substring(lastEnd));
        }

        return html;
      }

      function groupBy(array, fn) {
        return array.reduce((acc, item) => {
          const key = fn(item);
          if (!acc[key]) acc[key] = [];
          acc[key].push(item);
          return acc;
        }, {});
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    </script>
  </body>
</html>
