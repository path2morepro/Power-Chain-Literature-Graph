<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Biomedical Knowledge Graph</title>

<!-- vis-network -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
<link  href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet"/>

<style>
  /* ── design tokens ── */
  :root {
    --bg:          #0d1117;
    --surface:     #161b22;
    --surface2:    #21262d;
    --border:      #30363d;
    --text:        #e6edf3;
    --muted:       #8b949e;
    --accent:      #58a6ff;

    --c-anat:      #3fb950;   /* green  – Anatomical Entity */
    --c-sym:       #f85149;   /* red    – Symptom           */
    --c-move:      #d2a8ff;   /* purple – Movement          */

    --c-anat-dim:  #1a3a1e;
    --c-sym-dim:   #3a1010;
    --c-move-dim:  #2d1a4a;

    --e-anat:      #3fb950;   /* anatomy link  */
    --e-contrib:   #e3b341;   /* contributes_to */
    --e-assoc:     #79c0ff;   /* associated_with */

    --panel-w:     380px;
    --header-h:    52px;
    --ctrl-h:      50px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── header ── */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }
  header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text);
  }
  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: .04em;
  }
  .badge-anat  { background: var(--c-anat-dim);  color: var(--c-anat);  border: 1px solid var(--c-anat); }
  .badge-sym   { background: var(--c-sym-dim);   color: var(--c-sym);   border: 1px solid var(--c-sym); }
  .badge-move  { background: var(--c-move-dim);  color: var(--c-move);  border: 1px solid var(--c-move); }

  .spacer { flex: 1; }

  /* stat pills */
  .stats { display: flex; gap: 10px; }
  .stat-pill {
    font-size: 10px; padding: 3px 10px; border-radius: 4px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted);
  }
  .stat-pill strong { color: var(--text); }

  /* ── control bar ── */
  .controls {
    height: var(--ctrl-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }
  .ctrl-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    white-space: nowrap;
  }
  .filter-btn {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .filter-btn.active { color: var(--text); border-color: var(--accent); background: #1c2a3a; }
  .filter-btn:hover  { border-color: var(--muted); color: var(--text); }

  .search-wrap {
    margin-left: auto;
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-wrap input {
    font-family: inherit;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    padding: 4px 10px 4px 28px;
    width: 200px;
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 8px;
    color: var(--muted); font-size: 12px; pointer-events: none;
  }

  /* ── main layout ── */
  .workspace {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* ── canvas ── */
  #graph-canvas {
    flex: 1;
    height: 100%;
    background: var(--bg);
  }

  /* ── side panel ── */
  #panel {
    width: var(--panel-w);
    height: 100%;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform .25s ease;
    overflow: hidden;
  }
  #panel.collapsed { transform: translateX(var(--panel-w)); width: 0; border: none; }

  .panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
  }
  #panel-entity-type {
    font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600;
    letter-spacing: .04em; display: none;
  }
  .panel-close {
    margin-left: auto; cursor: pointer; color: var(--muted);
    font-size: 16px; line-height: 1; padding: 2px 4px;
    border-radius: 4px; transition: color .15s;
  }
  .panel-close:hover { color: var(--text); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* panel sections */
  .p-section { border-bottom: 1px solid var(--border); padding: 14px 16px; }
  .p-section:last-child { border-bottom: none; }

  .p-section-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .p-entity-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  /* mention pills */
  .mention-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .mention-pill {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .mention-pill strong { color: var(--text); }

  /* evidence cards */
  .evi-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 11px;
    line-height: 1.6;
  }
  .evi-card .abs-tag {
    font-size: 9px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 5px;
  }
  .evi-text { color: var(--muted); font-style: italic; }
  .evi-abs  { color: #444d56; font-size: 10px; margin-top: 6px; line-height: 1.5;
               max-height: 80px; overflow: hidden; display: none; }
  .evi-card.expanded .evi-abs { display: block; }
  .evi-toggle {
    font-size: 9px; color: var(--accent); cursor: pointer; margin-top: 4px;
    text-transform: uppercase; letter-spacing: .05em;
  }

  /* population */
  .pop-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .pop-chip {
    font-size: 10px; padding: 2px 8px; border-radius: 3px;
    background: #1c2a3a; border: 1px solid #2a4060; color: #79c0ff;
  }

  /* relation type tag */
  .rel-tag {
    font-size: 10px; padding: 3px 10px; border-radius: 20px;
    font-weight: 600; letter-spacing: .04em; display: inline-block; margin-top: 4px;
  }
  .rel-contributes_to  { background:#2d2206; color:var(--e-contrib); border:1px solid var(--e-contrib); }
  .rel-associated_with { background:#0c2033; color:var(--e-assoc);   border:1px solid var(--e-assoc); }
  .rel-anatomical_link { background:var(--c-anat-dim); color:var(--e-anat); border:1px solid var(--e-anat); }

  /* empty state */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 2;
  }
  .empty-state .icon { font-size: 32px; display: block; margin-bottom: 12px; opacity: .4; }

  /* ── loading overlay ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    gap: 16px;
  }
  #loading .ld-title { font-size: 12px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
  .ld-bar { width: 200px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .ld-fill { height: 100%; width: 0; background: var(--accent); border-radius: 2px; animation: fill 1.6s ease forwards; }
  @keyframes fill { to { width: 100%; } }
  #loading.done { opacity: 0; pointer-events: none; transition: opacity .4s; }
</style>
</head>

<body>

<!-- ── loading ── -->
<div id="loading">
  <span class="ld-title">Building graph …</span>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<!-- ── header ── -->
<header>
  <h1>Biomedical Knowledge Graph</h1>
  <span class="badge badge-anat">● Anatomical</span>
  <span class="badge badge-sym">● Symptom</span>
  <span class="badge badge-move">● Movement</span>
  <div class="spacer"></div>
  <div class="stats">
    <div class="stat-pill" id="stat-nodes"><strong>–</strong> nodes</div>
    <div class="stat-pill" id="stat-edges"><strong>–</strong> edges</div>
  </div>
</header>

<!-- ── controls ── -->
<div class="controls">
  <span class="ctrl-label">Show</span>
  <button class="filter-btn active" data-filter="all">All edges</button>
  <button class="filter-btn" data-filter="relation">contributes_to &amp; associated_with</button>
  <button class="filter-btn" data-filter="anatomy">anatomical links</button>

  <span class="ctrl-label" style="margin-left:12px;">Nodes</span>
  <button class="filter-btn active" data-node-filter="Anatomical Entity">Anatomical</button>
  <button class="filter-btn active" data-node-filter="Symptom">Symptom</button>
  <button class="filter-btn active" data-node-filter="Movement">Movement</button>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Search entity…"/>
  </div>
</div>

<!-- ── workspace ── -->
<div class="workspace">
  <div id="graph-canvas"></div>

  <div id="panel">
    <div class="panel-header">
      <span class="panel-title" id="panel-title">Select a node or edge</span>
      <span id="panel-entity-type"></span>
      <span class="panel-close" title="Close" id="panel-close">✕</span>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="empty-state">
        <span class="icon">⬡</span>
        Click a node or edge<br/>to explore details
      </div>
    </div>
  </div>
</div>

<!-- ──────────────────────────────────────────────────────────
     GRAPH LOGIC
──────────────────────────────────────────────────────────── -->
<script>
// ── colour / style constants ───────────────────────────────
const STYLE = {
  node: {
    "Anatomical Entity": {
      color:  { background:"#1a3a1e", border:"#3fb950", highlight:{background:"#254d2a",border:"#56d364"} },
      shape:  "hexagon", size: 18, font: { color:"#3fb950", size:11, face:"'SF Mono',monospace" },
    },
    "Symptom": {
      color:  { background:"#3a1010", border:"#f85149", highlight:{background:"#4d1616",border:"#ff6b6b"} },
      shape:  "diamond",  size: 16, font: { color:"#f85149", size:11, face:"'SF Mono',monospace" },
    },
    "Movement": {
      color:  { background:"#2d1a4a", border:"#d2a8ff", highlight:{background:"#3d2260",border:"#e0b4ff"} },
      shape:  "ellipse",  size: 14, font: { color:"#d2a8ff", size:11, face:"'SF Mono',monospace" },
    },
  },
  edge: {
    "anatomical_link": {
      color:{ color:"#3fb950", opacity:.5, highlight:"#3fb950" },
      dashes:true, width:1, arrows:{to:{enabled:true,scaleFactor:.4}},
    },
    "contributes_to": {
      color:{ color:"#e3b341", opacity:.8, highlight:"#f0c855" },
      dashes:false, width:2, arrows:{to:{enabled:true,scaleFactor:.6}},
    },
    "associated_with": {
      color:{ color:"#79c0ff", opacity:.75, highlight:"#a8d4ff" },
      dashes:false, width:1.5, arrows:{to:{enabled:true,scaleFactor:.5},
                                       from:{enabled:true,scaleFactor:.5}},
    },
  },
};

// ── load graph.json ────────────────────────────────────────
fetch("graph.json")
  .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
  .then(graph => initGraph(graph))
  .catch(err => {
    document.getElementById("loading").innerHTML =
      `<div style="color:#f85149;font-size:13px;">
         Failed to load graph.json<br>
         <span style="color:#8b949e;font-size:11px;">${err.message}</span><br><br>
         <span style="color:#8b949e;font-size:10px;">Run build_graph.py first, then serve this folder via HTTP.</span>
       </div>`;
  });

// ── main init ─────────────────────────────────────────────
function initGraph(graph) {
  const nodeMap = graph.nodes;   // id → node
  const edges   = graph.edges;

  // ── build vis datasets ──────────────────────────────────
  const allVisNodes = new vis.DataSet(
    Object.values(nodeMap).map(n => {
      const s = STYLE.node[n.type] || STYLE.node["Movement"];
      return {
        id:    n.id,
        label: n.label,
        title: n.label,
        group: n.type,
        ...s,
        _raw: n,
      };
    })
  );

  const allVisEdges = new vis.DataSet(
    edges.map(e => {
      const s = STYLE.edge[e.relation] || STYLE.edge["associated_with"];
      return {
        id:     e.id,
        from:   e.source,
        to:     e.target,
        title:  e.relation,
        smooth: { type:"curvedCW", roundness: e.edge_class==="anatomy" ? .1 : .2 },
        ...s,
        _raw: e,
      };
    })
  );

  // Working subsets (filtered)
  const visNodes = new vis.DataSet(allVisNodes.get());
  const visEdges = new vis.DataSet(allVisEdges.get());

  // ── stats ───────────────────────────────────────────────
  document.getElementById("stat-nodes").innerHTML =
    `<strong>${allVisNodes.length}</strong> nodes`;
  document.getElementById("stat-edges").innerHTML =
    `<strong>${allVisEdges.length}</strong> edges`;

  // ── network options ─────────────────────────────────────
  const options = {
    nodes: {
      borderWidth: 1.5,
      shadow: { enabled:true, color:"rgba(0,0,0,.6)", size:8, x:0, y:4 },
      font:   { size:11, face:"'SF Mono',monospace" },
    },
    edges: {
      smooth: { enabled:true },
      shadow: false,
      selectionWidth: 3,
      hoverWidth: 2,
    },
    physics: {
      enabled: true,
      solver:  "forceAtlas2Based",
      forceAtlas2Based: {
        gravitationalConstant: -60,
        centralGravity:        0.005,
        springLength:          120,
        springConstant:        0.08,
        damping:               0.4,
        avoidOverlap:          0.8,
      },
      stabilization: { iterations: 600, updateInterval: 25 },
    },
    interaction: {
      hover:        true,
      tooltipDelay: 150,
      multiselect:  false,
    },
  };

  const network = new vis.Network(
    document.getElementById("graph-canvas"),
    { nodes: visNodes, edges: visEdges },
    options
  );

  // hide loading overlay once stabilised
  network.once("stabilized", () => {
    document.getElementById("loading").classList.add("done");
  });

  // ── panel helpers ────────────────────────────────────────
  function showNode(rawNode) {
    const typeLabel = rawNode.type;
    const typeBadgeClass =
      typeLabel==="Anatomical Entity" ? "badge-anat" :
      typeLabel==="Symptom"           ? "badge-sym"  : "badge-move";

    const et = document.getElementById("panel-entity-type");
    et.textContent = typeLabel;
    et.className   = `badge ${typeBadgeClass}`;
    et.style.display = "inline-block";

    document.getElementById("panel-title").textContent = rawNode.label;

    const absCount = new Set(rawNode.mentions.map(m=>m.abstract_id)).size;
    const mentionsHtml = rawNode.mentions.slice(0,20).map(m =>
      `<span class="mention-pill"><strong>${m.abstract_id}</strong> @${m.position} "${m.original_text}"</span>`
    ).join("");

    document.getElementById("panel-body").innerHTML = `
      <div class="p-section">
        <div class="p-section-label">Entity</div>
        <div class="p-entity-label">${rawNode.label}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px;">${rawNode.id}</div>
      </div>
      <div class="p-section">
        <div class="p-section-label">Mentions (${rawNode.mentions.length} across ${absCount} abstracts)</div>
        <div class="mention-list">${mentionsHtml}</div>
      </div>
    `;
  }

  function showEdge(rawEdge) {
    const srcNode = nodeMap[rawEdge.source];
    const tgtNode = nodeMap[rawEdge.target];

    const et = document.getElementById("panel-entity-type");
    et.style.display = "none";

    document.getElementById("panel-title").textContent =
      `${srcNode?.label ?? rawEdge.source}  →  ${tgtNode?.label ?? rawEdge.target}`;

    const relHtml = `<span class="rel-tag rel-${rawEdge.relation}">${rawEdge.relation}</span>`;

    const evCards = rawEdge.abstracts.map(ab => {
      const hasEvi  = ab.evidence && ab.evidence.trim();
      const hasText = ab.abstract_text && ab.abstract_text.trim();
      const short   = hasText ? ab.abstract_text.slice(0,180)+"…" : "";
      return `
        <div class="evi-card" onclick="this.classList.toggle('expanded')">
          <div class="abs-tag">${ab.abstract_id}</div>
          ${hasEvi ? `<div class="evi-text">"${ab.evidence}"</div>` : ""}
          ${hasText ? `<div class="evi-abs">${short}</div>
                       <div class="evi-toggle">▸ abstract snippet</div>` : ""}
        </div>`;
    }).join("") || "<div style='color:var(--muted);font-size:11px;'>No evidence recorded.</div>";

    const popChips = rawEdge.population_entities.map(p =>
      `<span class="pop-chip">${p.entity_form}</span>`
    ).join("") || "<span style='color:var(--muted);font-size:11px;'>—</span>";

    document.getElementById("panel-body").innerHTML = `
      <div class="p-section">
        <div class="p-section-label">Relation</div>
        ${relHtml}
        <div style="font-size:10px;color:var(--muted);margin-top:6px;">
          <strong style="color:var(--text)">${srcNode?.label}</strong>
          &nbsp;→&nbsp;
          <strong style="color:var(--text)">${tgtNode?.label}</strong>
        </div>
      </div>
      <div class="p-section">
        <div class="p-section-label">Evidence from ${rawEdge.abstracts.length} abstract(s)</div>
        ${evCards}
      </div>
      <div class="p-section">
        <div class="p-section-label">Population context</div>
        <div class="pop-list">${popChips}</div>
      </div>
    `;
  }

  function clearPanel() {
    document.getElementById("panel-title").textContent = "Select a node or edge";
    const et = document.getElementById("panel-entity-type");
    et.style.display = "none";
    document.getElementById("panel-body").innerHTML = `
      <div class="empty-state">
        <span class="icon">⬡</span>
        Click a node or edge<br/>to explore details
      </div>`;
  }

  // ── network events ───────────────────────────────────────
  network.on("selectNode", params => {
    const id  = params.nodes[0];
    const raw = allVisNodes.get(id)?._raw;
    if (raw) showNode(raw);
  });

  network.on("selectEdge", params => {
    if (params.nodes.length > 0) return;  // node click also fires edge
    const id  = params.edges[0];
    const raw = allVisEdges.get(id)?._raw;
    if (raw) showEdge(raw);
  });

  network.on("deselectNode",  () => clearPanel());
  network.on("deselectEdge",  () => clearPanel());

  // ── panel close ──────────────────────────────────────────
  document.getElementById("panel-close").addEventListener("click", clearPanel);

  // ── edge-type filter ─────────────────────────────────────
  let activeEdgeFilter = "all";
  let activeNodeTypes  = new Set(["Anatomical Entity","Symptom","Movement"]);

  function applyFilters() {
    const filteredEdges = allVisEdges.get().filter(e => {
      if (activeEdgeFilter === "relation" && e._raw.edge_class !== "relation") return false;
      if (activeEdgeFilter === "anatomy"  && e._raw.edge_class !== "anatomy")  return false;
      // both endpoints must be in active node types
      const srcType = nodeMap[e._raw.source]?.type;
      const tgtType = nodeMap[e._raw.target]?.type;
      if (!activeNodeTypes.has(srcType) || !activeNodeTypes.has(tgtType)) return false;
      return true;
    });

    const filteredNodes = allVisNodes.get().filter(n =>
      activeNodeTypes.has(n._raw.type)
    );

    visNodes.clear(); visNodes.add(filteredNodes);
    visEdges.clear(); visEdges.add(filteredEdges);

    document.getElementById("stat-nodes").innerHTML =
      `<strong>${filteredNodes.length}</strong> nodes`;
    document.getElementById("stat-edges").innerHTML =
      `<strong>${filteredEdges.length}</strong> edges`;
  }

  document.querySelectorAll("[data-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-filter]").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      activeEdgeFilter = btn.dataset.filter;
      applyFilters();
    });
  });

  document.querySelectorAll("[data-node-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      const t = btn.dataset.nodeFilter;
      if (activeNodeTypes.has(t)) {
        if (activeNodeTypes.size > 1) { activeNodeTypes.delete(t); btn.classList.remove("active"); }
      } else {
        activeNodeTypes.add(t); btn.classList.add("active");
      }
      applyFilters();
    });
  });

  // ── search ───────────────────────────────────────────────
  document.getElementById("search-input").addEventListener("input", function() {
    const q = this.value.toLowerCase().trim();
    if (!q) {
      // reset all node styles
      visNodes.update(
        visNodes.get().map(n => ({ id:n.id, opacity:1 }))
      );
      return;
    }
    const updates = visNodes.get().map(n => ({
      id:      n.id,
      opacity: n._raw.label.toLowerCase().includes(q) ? 1 : 0.12,
    }));
    visNodes.update(updates);

    // auto-focus first hit
    const hit = updates.find(u => u.opacity === 1);
    if (hit) {
      network.focus(hit.id, { scale:1.4, animation:{duration:400,easingFunction:"easeInOutQuad"} });
    }
  });
}
</script>
</body>
</html>
